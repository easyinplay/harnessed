name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]
    defaults:
      run:
        shell: bash
    steps:
      # Phase 1.1.1 hotfix H1: pin actions to SHA (supply-chain hardening).
      # Tag refs (@v4) are mutable; SHA refs are immutable. Commit SHA below
      # corresponds to v4.3.1 (actions/checkout) and v4.4.0 (actions/setup-node)
      # as of 2026-05-12.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # H2: full history + tags needed for ADR 0001/0002 Õ«łµüÆ check below
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
      # Phase 1.1.1 hotfix H2: A7 acceptance bar (ADR 0001/0002 main body Õ«łµüÆ)
      # is now CI-enforced. Any drift since the adr-0001-accepted tag fails CI.
      - name: A7 acceptance bar ŌĆö ADR 0001/0002 main body Õ«łµüÆ
        run: |
          git fetch origin tag adr-0001-accepted --no-tags || {
            echo "::warning::adr-0001-accepted tag not yet pushed ŌĆö skipping A7 Õ«łµüÆ check"
            exit 0
          }
          diff_out=$(git diff adr-0001-accepted -- docs/adr/0001-manifest-schema-v1.md docs/adr/0002-repo-structure-toolchain-v0.1.md)
          if [ -n "$diff_out" ]; then
            echo "::error::A7 acceptance bar violated ŌĆö ADR 0001/0002 main body changed since adr-0001-accepted tag"
            echo "$diff_out"
            exit 1
          fi
          echo "A7 Ō£ģ ADR 0001/0002 main body unchanged"
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm typecheck
      - run: corepack pnpm lint
      - run: corepack pnpm test
      - run: corepack pnpm build
      - run: corepack pnpm build:schema
      - run: corepack pnpm validate:schema
      - run: node ./dist/cli.mjs --version
