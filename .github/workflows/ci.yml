name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]
    defaults:
      run:
        shell: bash
    steps:
      # Phase 1.1.1 hotfix H1: pin actions to SHA (supply-chain hardening).
      # Tag refs (@v4) are mutable; SHA refs are immutable. Commit SHA below
      # corresponds to v4.3.1 (actions/checkout) and v4.4.0 (actions/setup-node)
      # as of 2026-05-12.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # H2: full history + tags needed for ADR 0001/0002 守恒 check below
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
      # Phase 1.1.1 hotfix H2 + Phase 1.2 H5 sister review hardening:
      # A7 acceptance bar enforces ADR 0001-0005 main body 守恒 (unchanged
      # since each adr-NNNN-accepted baseline tag). Any drift fails CI.
      # H5 expands from hardcoded 0001/0002 check to iterate all 5 baseline
      # tags so newly-shipped ADRs (0003 errata, 0004 UX contract,
      # 0005 marketplace_source errata) are also frozen.
      - name: A7 acceptance bar — ADR 0001-0005 main body 守恒
        run: |
          missing_tags=()
          for n in 0001 0002 0003 0004 0005; do
            if ! git fetch origin "tag" "adr-${n}-accepted" --no-tags 2>/dev/null; then
              missing_tags+=("adr-${n}-accepted")
              continue
            fi
          done
          if [ ${#missing_tags[@]} -gt 0 ]; then
            echo "::warning::baseline tag(s) not yet pushed — skipping A7 守恒 check for: ${missing_tags[*]}"
            exit 0
          fi
          fail=0
          for n in 0001 0002 0003 0004 0005; do
            diff_out=$(git diff "adr-${n}-accepted" -- "docs/adr/${n}-*.md")
            if [ -n "$diff_out" ]; then
              echo "::error::A7 acceptance bar violated — ADR ${n} main body changed since adr-${n}-accepted tag"
              echo "$diff_out"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "A7 ✅ ADR 0001-0005 main body unchanged"
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm typecheck
      - run: corepack pnpm lint
      - run: corepack pnpm test
      - run: corepack pnpm build
      - run: corepack pnpm build:schema
      - run: corepack pnpm validate:schema
      - run: node ./dist/cli.mjs --version
