name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]
    defaults:
      run:
        shell: bash
    steps:
      # Phase 1.1.1 hotfix H1: pin actions to SHA (supply-chain hardening).
      # Tag refs (@v4) are mutable; SHA refs are immutable. Commit SHA below
      # corresponds to v4.3.1 (actions/checkout) and v4.4.0 (actions/setup-node)
      # as of 2026-05-12.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # H2: full history + tags needed for ADR 0001/0002 守恒 check below
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
      # Phase 1.1.1 hotfix H2 + Phase 1.2 H5 + Phase 1.2.5 wedge + Phase 1.3 ADR 0007 errata + Phase 1.4 ADR 0008 errata + Phase 1.5 ADR 0009 errata + Phase 2.1 ADR 0010 errata + Phase 2.2 ADR 0011 errata + Phase 2.3 ADR 0012 errata + Phase 2.4 ADR 0013 errata + Phase 3.1 ADR 0014 errata + Phase 3.2 ADR 0015 errata + Phase 3.3 ADR 0016 errata + Phase 3.4 ADR 0017 errata:
      # A7 acceptance bar enforces ADR 0001-0017 main body 守恒 (unchanged
      # since each adr-NNNN-accepted baseline tag). Any drift fails CI.
      # Phase 1.2.5 加 ADR 0006 (three-stack mechanization wedge); Phase 1.3
      # 加 ADR 0007 (categorization schema errata — manifest 加 3 字段);
      # Phase 1.4 加 ADR 0008 (routing engine v1 errata — phase 1.3 deferred
      # items inline + 接口契约升级跟踪点); Phase 1.5 加 ADR 0009 (routing
      # L2 + engineering 23 招式 errata — D5 三 P1 interface contract delta +
      # DAG + Semantic Router L2 stub + mattpocock_phases schema); Phase 2.1
      # 加 ADR 0010 (installer schema extension errata — license whitelist
      # MIT-0/anthropics-official + license_source audit field + bundle-install
      # provides[] + install_type↔method 1:N enforcement + H3 agentDefinition
      # budget ≤200L errata + H4 substring match known limitation + D-16
      # --header ${ENV_VAR} env-resolution carve-out); Phase 2.2 加 ADR 0011
      # (execute-task workflow + ralph-loop SDK introduction + dual-signal
      # completion 4-layer + per-phase model tier + Wave 0 transparency gate
      # flip + schemaVersion 7-surface + provenance gate hard fail + Task
      # Session 复用 conditional DEFERRED → v0.3.0 — 9 章节 errata 合并);
      # Phase 2.3 加 ADR 0012 (extension category MVP + karpathy SKILL inject
      # 引擎 + EE-5 双层 + CD-3 negative-space + 30-sample routing 100%
      # (≥85% bar 远超) + Wave 0 backlog 6 项一次根治 — 9 章节 errata 合并);
      # Phase 2.4 加 ADR 0013 (doctor MIN 5 check + EE-4 plan-checker 4 维量化
      # SSOT + dashboard C 路径 3 子功能 FULL absorb + README CI counter gate
      # B 路径 + audit 完整版 hard-fail + ralph-loop Win sentinel 5 fixture +
      # Wave 0 backlog 5 项一次根治 — 9 章节 errata 合并, v0.2.0 milestone 末);
      # Phase 3.1 加 ADR 0014 (checkpoint engine + harnessed resume + compact
      # 协议 + T4.4 closure infra activation 闭环 — 9 章节 errata 合并,
      # v0.3.0 milestone 第 1 phase);
      # Phase 3.2 加 ADR 0015 (gstack 前缀探测 + workflow 变量插值 +
      # plan-feature reference 实装 + T4.4 closure infra 二代消费者 闭环 —
      # 9 章节 errata 合并, v0.3.0 milestone 第 2 phase);
      # Phase 3.3 加 ADR 0016 (aliases.yaml RICH 5-field redirect (D-01) +
      # DOCTOR-ONLY-WARN install 安静 + doctor 7th check 人读 audit (D-02) +
      # known-good YAML manifest lazy lock (D-03) + STATE dual-SSOT
      # 5-recurrence terminus COLLAPSE (D-04 (b) LOCKED) + Wave 0 backlog
      # 3 项一次根治 + manifest-domain colocation 3rd consumer 闭环 — 9 章节
      # errata 合并, v0.3.0 milestone 第 3 phase);
      # Phase 3.4 加 ADR 0017 (routing 命中率 ≥ 85% 验收 30/30 = 100% per-tier
      # Sonnet/Haiku/Opus 100/100/100 (D-01 REAL HISTORICAL + D-02 RUN ENGINE
      # per-sample arbitrate dispatch) + check-token-budget.ts 48L PRIMARY
      # helper 4th family member + doctor 8th check DOCTOR-ONLY-WARN
      # status='warn'≠fail (D-03 Buffer.byteLength /4 zero-dep + D-04) +
      # W0.1 STRATEGIC institutionalize 4 D-decisions D1-D4 + W0 backlog
      # 5 项一次根治 — 9 章节 errata 合并, v0.3.0 milestone 第 4 phase
      # CLOSE);
      # baseline tag iterate 扩到 17 个 (1-0016 → 1-0017, Phase 3.4 W2 T2.7 落地
      # per W-02 orchestrator explicit literal `ADR 0001-0017` fix sister
      # Phase 3.3 W2 T2.7 + Phase 3.2 W3 T3.4 + Phase 3.1 W5 T5.4 pattern).
      # Phase 4.3 加 ADR 0018 (routing audit log + R8.4 ADR backfill + v0.4.0 milestone close —
      # 9 章节 errata 合并, v0.4.0 milestone 末);
      # Phase 5.1 加 ADR 0019 0020 0021 (retroactive adr-0019/0020-accepted Phase 5.1 W0 T0.4
      # LOCAL CREATE + adr-0021-accepted Phase 5.1 W2 T2.9 LOCAL CREATE; retroactive iter
      # 0018→0021 per RESEARCH § 5 critical finding absorbed T2.8 CRITICAL fix):
      # Phase v2.0-2.6 W1 ADR 0024-0029 backfill — iter 0023→0029 (6 ADR: workflow schema v2 + capabilities baseline + judgments multi-file + research/verify-work workflows + ralph-loop+TDD+Agent Teams + fallback 3 铁律 + 4-stage 机器化 close).
      # Phase v3.0-3.6 W1 ADR 0030-0032 backfill — iter 0029→0032 (3 ADR: namespace policy bare slash cmd + 4-stage namespace-layered architecture + cross-cutting disciplines + execution mechanism).
      - name: A7 acceptance bar — ADR 0001-0032 main body 守恒
        run: |
          missing_tags=()
          for n in 0001 0002 0003 0004 0005 0006 0007 0008 0009 0010 0011 0012 0013 0014 0015 0016 0017 0018 0019 0020 0021 0022 0023 0024 0025 0026 0027 0028 0029 0030 0031 0032; do
            if ! git fetch origin "tag" "adr-${n}-accepted" --no-tags 2>/dev/null; then
              missing_tags+=("adr-${n}-accepted")
              continue
            fi
          done
          if [ ${#missing_tags[@]} -gt 0 ]; then
            echo "::warning::baseline tag(s) not yet pushed — skipping A7 守恒 check for: ${missing_tags[*]}"
            exit 0
          fi
          fail=0
          for n in 0001 0002 0003 0004 0005 0006 0007 0008 0009 0010 0011 0012 0013 0014 0015 0016 0017 0018 0019 0020 0021 0022 0023 0024 0025 0026 0027 0028 0029 0030 0031 0032; do
            diff_out=$(git diff "adr-${n}-accepted" -- "docs/adr/${n}-*.md")
            if [ -n "$diff_out" ]; then
              echo "::error::A7 acceptance bar violated — ADR ${n} main body changed since adr-${n}-accepted tag"
              echo "$diff_out"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "A7 ✅ ADR 0001-0032 main body unchanged"
      # Phase 2.1 T1.7 — transparency verdict-marker gate (ADR 0010, D2.1-7/8).
      # Scans .planning verdict docs for closure-marker lines missing an N/N
      # ratio + miss: declaration. W3: warn-only round 1 (script exits 0 even
      # on violations); ENFORCE flag flips to true in phase 2.2.
      - name: Transparency verdict-marker gate (warn-only round 1)
        run: node scripts/check-transparency-verdicts.mjs
      # Phase 3.4 W0.1 D3 — STATE.md archive cadence gate (3 rules, warn-only round 1).
      # Sister scripts/check-transparency-verdicts.mjs cadence: ENFORCE=false initial →
      # flip true Phase 3.5 OR v0.4.0 per DEFERRED #AF (sister Phase 2.1 transparency
      # gate W3 warn-only round 1 → Phase 2.2 W0 ENFORCE=true 沿袭). 3 rules: (1)
      # STATE.md size ≤200L round 1 (≤150 v0.4 tighten per DEFERRED #AG); (2) 关键决议
      # ship 总结 section ≤1 occurrence (防 sister review H2 复发); (3) historical
      # W-N errata / sister review M[1-9] 修正 literal 禁字面 (move to RETROSPECTIVE).
      - name: Check STATE.md archive cadence (warn-only round 1)
        run: node scripts/check-state-archive-stale.mjs
      # Phase 2.2 T4.0 — provenance gate (ADR 0011 § 8, B-33+B-34, CD-6 ⭐⭐).
      # Walks .harnessed/{sessions,checkpoints,route-logs}/** — every runtime
      # artifact must have sibling .provenance.json (4 fields per
      # provenance.schema.json). Curated paths (workflows/**, manifest.yaml)
      # NOT in scope per R8.
      - name: Provenance gate (Phase 2.2 W4 hard fail — CD-6)
        run: node scripts/check-provenance.mjs
      # Phase v2.0-2.3 W0 T2.3.W0.6 — workflow schema validate (R20.2 + R20.4).
      # Walks workflows/capabilities.yaml + workflows/judgments/*.yaml against
      # TypeBox schemas (src/workflow/schema/{capabilities,judgment}.ts SSOT;
      # Workflow schema validate moved AFTER pnpm install (v3.3.1 CI hotfix
      # 2026-05-21) — script imports @sinclair/typebox which needs node_modules,
      # sister pattern "EE-4 plan-checker quant gate" L173-177 verbatim。
      # Phase 2.3 Wave 0 T0.6 — Provenance Win pwsh sentinel (T1.3).
      # Phase 1.3.1 F37 路径分隔符踩过坑; Phase 2.2 T4.0 check-provenance.mjs
      # 跑过 4-step synthetic 但 glob .harnessed/{sessions,checkpoints,route-logs}/**
      # 在 Win path-sep 行为未验. 此 step Win-only invoke 走 pwsh shell, 验
      # Win path-sep behavior parity with bash.
      - name: Provenance gate (Win pwsh sentinel, Phase 2.3 Wave 0 T1.3)
        if: runner.os == 'Windows'
        shell: pwsh
        run: node scripts/check-provenance.mjs
      # Phase 2.3 Wave 0 T0.8 — Deferred items review cadence (T5).
      # 沿袭 transparency gate W3 warn-only round 1 模式 (Phase 2.2 flip ENFORCE=true 前置).
      # D-OOS-1 .omc/ 2026-05-13 → 2026-05-15 三 phase 未 review process bug 根治.
      - name: Deferred items review (Phase 2.3 Wave 0 T5, warn-only round 1)
        run: node scripts/check-deferred-items.mjs
        continue-on-error: true
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      # Workflow schema validate — moved here AFTER pnpm install (v3.3.1 CI hotfix
      # 2026-05-21) so @sinclair/typebox import resolves。Hard fail (NOT warn-only) —
      # schema 与 shipped yaml 1:1 对齐 (sister Phase 2.3 W0.6 + Phase 3.3 W0.10 ship).
      - name: Workflow schema validate (v2.0 NEW — T2.3.W0.6)
        run: node scripts/check-workflow-schema.mjs
      # Phase 2.4 W6 T6.2 — EE-4 plan-checker quantitative gate (B-11 + B-12 + D-02).
      # Walker scripts/run-plan-checker.mjs (T2.2 f986d42) consumes T2.1 schema
      # routing/plan-review-schema.yaml; BLOCKER (<=2/4 dims) -> exit 1 + ::error::
      # annotation; manual /gsd-plan-phase rerun required (B-12, NOT auto-spawn).
      # W6 ship: deferred-items #3 RESOLVED — moved AFTER pnpm install (was BEFORE,
      # caused yaml ERR_MODULE_NOT_FOUND on 3-OS CI per runs 25955198823+25958484645
      # masked by continue-on-error:true). ENFORCE=false retained as W2 warn-only
      # round 1 sister-pattern; deferred-items #2 phase-2.4 self-check end-state
      # 评估 → fr score 受 NEW files Wave 6 ship + meta-discussion weasel 影响
      # (inherent self-referential) → keep warn-only this ship, flip ENFORCE=true
      # post-Wave-6 v0.3.0 W0 prep.
      - name: EE-4 plan-checker quant gate (Phase 2.4 W6 T6.2 — post-pnpm-install fix)
        env:
          ENFORCE: 'false'
        run: node scripts/run-plan-checker.mjs .planning/
        continue-on-error: true
      - run: corepack pnpm typecheck
      - run: corepack pnpm lint
      # Phase 3.4 CI hotfix (2026-05-17) — build BEFORE test so dist/cli.mjs
      # exists for integration tests added at Phase 3.3 W2 T2.3 (commit 245955b):
      # install-aliases / install-known-good / install-silent-redirect all spawn
      # `node dist/cli.mjs`. Pre-hotfix: 3-OS test step failed `Cannot find
      # module dist/cli.mjs` because build was sequenced AFTER test.
      - run: corepack pnpm build
      - run: corepack pnpm test
      # Phase 2.4 W4 T4.3 — ralph-loop Win sentinel (B-30 MIN 5 fixture).
      # Sister Phase 2.3 W0 T0.6 provenance pwsh sentinel pattern (above). Verifies
      # ralph-loop wrapper contract (isComplete / MaxIterationsExceededError /
      # resumeSessionId propagation / structured_output PRIMARY path) under Win
      # event-loop + Git Bash fork timing (Phase 1.1 finding: WSL bash.exe breaks
      # subagent fork; doctor.ts T1.2 验过 Git Bash 路径 per B-04). Mock subagent
      # per B-30 + O5 (real CC SDK 需 ANTHROPIC_API_KEY OOS). shell:bash per B-04
      # (Git Bash path verified; pwsh sister reserved for provenance gate only).
      # Note: pnpm test (L127 above) already runs ALL tests; this step explicitly
      # invokes the Win-only sentinel for fail-fast surfacing in CI logs.
      - name: ralph-loop Win sentinel (Phase 2.4 W4 T4.3 — MIN 5 fixture per B-30)
        if: runner.os == 'Windows'
        shell: bash
        run: corepack pnpm test -- tests/routing/ralph-loop-win-sentinel.test.ts
      - run: corepack pnpm build:schema
      # Phase 2.3 Wave 0 T0.4 — M1 schema regen drift gate (Phase 2.2 RETROSPECTIVE
      # Lesson 6 自我建议落地). Catches spec.ts → schemas/manifest.v1.schema.json
      # drift (Phase 2.1 → Phase 2.2 hygiene commit 18150a5 precedent).
      - name: Schema regen gate (Phase 2.3 Wave 0 M1)
        run: |
          git diff --exit-code schemas/ || {
            echo "::error::schemas/ drift detected — run 'corepack pnpm build:schema' locally and commit"
            exit 1
          }
      # Phase 2.3 Wave 0 T0.5 — schemaVersion consumer call site gate (T1.2).
      # B1 plan-check fix (≥7 → ≥2 honest baseline) — Phase 2.2 W2 schemaVersion
      # 实际 helper-only adoption; ≥2 反映当前 grep -r "branchOnSchemaVersion" src/
      # = src/types/schemaVersion.ts (定义+self-ref). Phase 2.3+ 逐步扩 consumer per
      # surface (handoff doc / phases-yaml / manifest state / installer state /
      # route decision log / checkpoint / agent definition factory). 详 ADR 0012 § 7.
      - name: schemaVersion consumer gate (Phase 2.3 Wave 0 T1.2)
        run: |
          count=$(grep -r "branchOnSchemaVersion" src/ | wc -l | tr -d ' ')
          if [ "$count" -lt 2 ]; then
            echo "::error::expected >= 2 branchOnSchemaVersion call sites (Phase 2.2 W2 helper-only adoption baseline; Phase 2.3+ expands per surface — see ADR 0012 § 7 errata), found $count"
            exit 1
          fi
      - run: corepack pnpm validate:schema
      - run: node ./dist/cli.mjs --version
      # Phase 1.2 T5.5 — installer integration (H4 dual-layer):
      #   Layer 1 — mock claude CLI shim PATH-injected: lets mcp-stdio-add
      #     installer reach diff-render without "claude: command not found"
      #     on bare CI runners (no real claude install required).
      #   Layer 2 — real spawn ctx7 + gsd (npm-cli, claude-CLI-independent)
      #     dry-run: exercises npmCli installer end-to-end against real npm
      #     binaries the runner already ships. Tmpdir + npm_config_prefix
      #     isolate any global state changes from the runner's home dir.
      # Win edge: Git Bash on windows-latest sees `mock-bin/claude` (no .exe)
      # and tries to invoke it via cmd.exe; we use bash-shebang shim + chmod
      # +x which Git Bash handles via shebang routing. This pattern is
      # validated in phase 1.1.1 H4 sister review.
      - name: Installer integration (H4 dual-layer — mock shim + real npm-cli dry-run)
        env:
          npm_config_prefix: ${{ runner.temp }}/npm-prefix
        shell: bash
        run: |
          # CLI exit-code map (per cli/install.ts):
          #   0 = ok (apply succeeded)
          #   1 = error
          #   2 = aborted / dry-run sentinel / level-flag-missing
          # Dry-run runs ALWAYS exit 2 (the "aborted: user-cancel" dry-run
          # sentinel from npmCli.ts L97 + mcpStdioAdd.ts L153). We accept
          # exit 2 here as a successful dry-run; only exit 1 (error) fails CI.
          ok_or_dryrun() {
            local cmd="$1"
            shift
            # GHA bash default = `-e -o pipefail`. Pipefail makes the pipeline
            # exit non-0 if `$cmd` exits non-0 (even when tee exits 0), which
            # then triggers `-e` and kills the step before we can inspect
            # ${PIPESTATUS[0]}. Disable pipefail just around this pipe so the
            # pipeline's exit code = tee's (always 0); we read ${PIPESTATUS[0]}
            # explicitly to honor the dry-run exit-2 sentinel. (Phase 1.2.1 hotfix.)
            set +o pipefail
            "$cmd" "$@" 2>&1 | tee out.log
            local rc=${PIPESTATUS[0]}
            set -o pipefail
            if [ "$rc" -eq 0 ] || [ "$rc" -eq 2 ]; then return 0; fi
            echo "::error::installer command exited $rc (expected 0 or 2)"
            return 1
          }

          mkdir -p "$npm_config_prefix"
          # H4 layer 1 — mock claude CLI shim on PATH (no real claude needed)
          chmod +x scripts/ci/mock-claude-cli.sh
          mkdir -p "${{ runner.temp }}/mock-bin"
          cp scripts/ci/mock-claude-cli.sh "${{ runner.temp }}/mock-bin/claude"
          export PATH="${{ runner.temp }}/mock-bin:$PATH"

          # H4 layer 1 — mcp-stdio-add dry-run: shim must be reachable; diff
          # output must mention .mcp.json + the manifest name.
          ok_or_dryrun node ./dist/cli.mjs install tavily-mcp --dry-run --non-interactive
          grep -q "tavily-mcp" out.log
          grep -q ".mcp.json" out.log
          ok_or_dryrun node ./dist/cli.mjs install exa-mcp --dry-run --non-interactive
          grep -q "exa-mcp" out.log

          # H4 layer 2 — real spawn npm-cli (no claude CLI dep) dry-run.
          # ctx7 + gsd both declare `npm install -g` (L4); --system flag
          # required to pass confirmAt() level gate; --dry-run still
          # short-circuits before any global-PATH mutation.
          ok_or_dryrun node ./dist/cli.mjs install ctx7 --dry-run --non-interactive --system
          ok_or_dryrun node ./dist/cli.mjs install gsd --dry-run --non-interactive --system
