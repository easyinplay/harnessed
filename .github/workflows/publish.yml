name: publish
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to operate on (e.g. v3.9.8)'
        required: true
        type: string
      mode:
        description: 'publish (default) or dist-tag-fix (set latest to given tag)'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish
          - dist-tag-fix
permissions:
  contents: write # write: create the GitHub release (read was npm-only)
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  publish:
    name: npm ${{ inputs.mode || 'publish' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}
      # corepack enable BEFORE setup-node (unconditional — setup-node always runs):
      # v5 reads `packageManager` (pnpm) and errors locating pnpm without the shim.
      - run: corepack enable
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - if: inputs.mode != 'dist-tag-fix'
        run: corepack enable
      - if: inputs.mode != 'dist-tag-fix'
        run: corepack pnpm install --frozen-lockfile
      - if: inputs.mode != 'dist-tag-fix'
        run: corepack pnpm build
      - if: inputs.mode != 'dist-tag-fix'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: inputs.mode == 'dist-tag-fix'
        run: npm dist-tag add harnessed@${{ inputs.tag }} latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # GitHub release — runs on a real publish (not dist-tag-fix). Notes are the
      # matching CHANGELOG.md section; falls back to a one-liner if absent.
      - if: inputs.mode != 'dist-tag-fix'
        name: GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VER="${TAG#v}"
          # index()-based literal match (no regex escaping — robust across awk variants)
          awk -v ver="$VER" '
            index($0, "## [" ver "]") == 1 {f=1; print; next}
            f && index($0, "## [") == 1 {exit}
            f {print}
          ' CHANGELOG.md > /tmp/notes.md
          [ -s /tmp/notes.md ] || echo "Release $TAG" > /tmp/notes.md
          gh release create "$TAG" --title "$TAG" --notes-file /tmp/notes.md --verify-tag
  # B2 (v4.20.0) — per-OS 单文件二进制,作为 release 附件与 npm 渠道并行分发
  # (task_plan D4;签名/自更新属 Phase 3)。needs: publish — release 先存在才能 upload。
  # 首个 tag 发布时验证项(yml 无法本地全验,风险已记 progress.md)。
  binaries:
    if: inputs.mode != 'dist-tag-fix'
    name: binary ${{ matrix.os }}
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}
      - run: corepack enable
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - run: corepack pnpm install --frozen-lockfile
      - run: bun scripts/build-binary.mjs
      - name: upload binary to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" dist-bin/harnessed-* --clobber
