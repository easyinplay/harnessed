name: publish
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to operate on (e.g. v3.9.8)'
        required: true
        type: string
      mode:
        description: 'publish (default) or dist-tag-fix (set latest to given tag)'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish
          - dist-tag-fix
permissions:
  contents: read
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  publish:
    name: npm ${{ inputs.mode || 'publish' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - if: inputs.mode != 'dist-tag-fix'
        run: corepack enable
      - if: inputs.mode != 'dist-tag-fix'
        run: corepack pnpm install --frozen-lockfile
      - if: inputs.mode != 'dist-tag-fix'
        run: corepack pnpm build
      - if: inputs.mode != 'dist-tag-fix'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: inputs.mode == 'dist-tag-fix'
        run: npm dist-tag add harnessed@${{ inputs.tag }} latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
