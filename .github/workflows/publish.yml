name: publish
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to re-publish (e.g. v3.9.8)'
        required: true
        type: string
permissions:
  contents: read
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      # Phase 1.1.1 hotfix H1 SHA-pin pattern延袭 (ci.yml supply-chain hardening):
      # Tag refs (@v4) are mutable; SHA refs are immutable. Commit SHA below
      # corresponds to v4.3.1 (actions/checkout) and v4.4.0 (actions/setup-node)
      # as of 2026-05-12 — same SHAs as ci.yml.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'  # required for OIDC .npmrc generation
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm build
      # D-02 LOCKED: npm publish via NPM_TOKEN auth (OIDC Trusted Publishers E404 with new
      # package owner mapping issue;NPM_TOKEN granular/automation token path verified
      # working with publishing access "Require 2FA OR granular with bypass 2fa enabled").
      # Provenance attestation still signed via OIDC id-token (id-token: write permission).
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
