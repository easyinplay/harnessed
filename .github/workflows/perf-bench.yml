name: perf-bench (advisory)
# Phase 2.3 Wave 0 T0.3 — M3 perf gate 根治 (D2.3-1 (a) 移出 CI critical path).
# 移到 nightly cron + workflow_dispatch advisory-only — PR/push 不阻塞.
# 沿袭 RESEARCH § 1.3 sketch + STATE.md L553 M3 root cause resolution.
# 累积 nudge 终止: Win 50→100→130→160 / Nix 50→75→100 / local 50→75.
on:
  schedule:
    - cron: '0 3 * * *'  # daily 3am UTC
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: perf-bench-${{ github.ref }}
  cancel-in-progress: false
jobs:
  perf:
    name: perf ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # corepack enable BEFORE setup-node — v5 reads `packageManager` (pnpm) and
      # errors locating pnpm if the shim isn't on PATH yet.
      - run: corepack enable
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: perf threshold (advisory)
        run: |
          corepack pnpm test -- tests/integration/manifest-validate.perf.test.ts \
            || echo "::warning::perf threshold exceeded on ${{ matrix.os }} (advisory, non-blocking)"
        continue-on-error: true
