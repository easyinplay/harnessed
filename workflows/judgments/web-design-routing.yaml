# workflows/judgments/web-design-routing.yaml
# Bundled routing rule: 两段式叠加 — Stage 1 ui-ux-pro-max 结构骨架 → Stage 2 design-taste-frontend 视觉打磨
# Phase v3.0-3.2 Wave A RESEARCH → 3.3 W0.3 ship per D-11; v4.11 XOR→两段式 swap (taste-skill)
#
# 非仲裁: 不再「二选一」。Stage 1 = ui-ux-pro-max 理清受众/交互逻辑/设计主轴 (数据驱动结构骨架, 始终先跑);
# Stage 2 = design-taste-frontend 叠加细节 + 视觉打磨 → 高级感 (anti-slop, cross-agent)。
# 默认凡 UI 改动两段都 fire, 顺序上 polish 在结构之后。
#
# expr-eval 2.0.2 case-sensitive: keyword `and` / `or` 全小写

schema_version: harnessed.judgment.v1

triggers:
  ui-ux-pro-max-structure:
    description: |
      Stage 1 — 受众 / 交互逻辑 / 设计主轴, 数据驱动结构骨架 (始终先跑)。
      50+ styles, 161 color palettes, 57 font pairings, 161 product types,
      99 UX guidelines, 10 stacks, 25 chart types。
    fires_when: "phase.has_ui_changes == true"
    invokes:
      - capability: ui-ux-pro-max

  design-taste-polish:
    description: |
      Stage 2 — 叠加细节 + 视觉打磨 → 高级感, anti-slop (cross-agent, taste-skill);
      在 ui-ux-pro-max 结构骨架之上叠加 (顺序在结构之后)。默认凡 UI 改动都叠加。
    fires_when: "phase.has_ui_changes == true"
    invokes:
      - capability: design-taste-frontend

  design-review-post:
    description: |
      设计完成后可选 gstack /design-review — 设计系统一致性 + AI 审美问题识别。
      常规 PR 跳过, 不强制。
    fires_when: "phase.stage == 'verify' and phase.has_design_changes == true"
    invokes:
      - capability: gstack-design-review
