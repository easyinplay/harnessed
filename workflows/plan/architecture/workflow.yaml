# workflows/plan/architecture/workflow.yaml — Phase v3.0-3.4 W0 T3.4.W0.4
#
# Stage ②.a 架构层 sub-workflow — gstack /plan-eng-review (mandatory before
# complex-architecture phases per bundled plan-stage cadence).
#
# Sister refs:
#   - workflows/capabilities.yaml — plan-eng-review (Bucket 7 gstack 33 optional registry)
#   - .planning/phase-v3.0-3.2/RESEARCH-workflows.md § Area 2 sub-stage example verbatim
#
# Note: capabilities.yaml v3 entry name = `plan-eng-review` (NO `gstack-` prefix per
# Pattern A E.2 — Bucket 7 gstack 33 optional 命名 strip prefix per 用户 CLAUDE.md
# gstack skill routing 直接 invoke cmd 名)。
# v3.9.25 — gate 重构为 judgments.stage-routing.plan-architecture-delegate.fires
# (sister trigger 早已存在; literal expr 被 judgmentResolver 拒绝 → fail-soft
# fires=true 隐藏意图 → 用 ref 让 gate eval 走正常路径)。

schema_version: harnessed.workflow.v3
workflow: plan-architecture
description: |
  Stage ②.a 架构层 — gstack /plan-eng-review (复杂架构强制, sister CLAUDE.md "⚠️ 复杂架构前")。
  Gate: judgments.stage-routing.plan-architecture-delegate.fires
  (fires_when: phase.is_complex_architecture == true)。

disciplines_applied: [karpathy, output-style, language, operational, priority, protocols]
tools_available: [plan-eng-review]

phases:
  - id: 01-plan-eng-review
    name: plan-eng-review (复杂架构审查 — engineering manager 视角, 锁定架构再 plan-phase)
    upstream: gstack
    capability: '{{ capabilities.plan-eng-review.cmd }}'
    model: opus
    gate: judgments.stage-routing.plan-architecture-delegate.fires
    max_iterations: '{{ defaults.ralph_max_iterations.plan-architecture.01-plan-eng-review }}'
