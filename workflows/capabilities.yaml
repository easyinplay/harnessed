# <packageRoot>/workflows/capabilities.yaml — harnessed v3.0 capabilities baseline
#
# Maintainer-curated static manifest mapping abstract capability name → concrete
# impl + slash-cmd. Consumed by workflows/*/workflow.yaml v2 via `{{ capabilities.<name>.cmd }}`
# template interpolation (per R20.2 flat yaml map + R20.5 static manifest + ADR per upgrade).
#
# Pure bundled distribution (per R20.1 + D-01): end-user 不 override; maintainer 改此文件 +
# ADR 0024+ + npm patch release (2-3 day cycle). Schema = harnessed.capabilities.v1 (sister
# Phase 2.2 schemaVersion 7 surface convention).
#
# Entry buckets (5, total 35):
#   1. mattpocock 12 高频招式 (D-09)        — grill-with-docs / zoom-out / diagnose / caveman /
#                                              grill-me / tdd / to-prd / to-issues /
#                                              improve-codebase-architecture / code-review /
#                                              code-simplifier / investigate
#   2. special-purpose tools 13+ (D-14)     — ui-ux-pro-max / frontend-design / playwright-cli /
#                                              playwright-test / webapp-testing /
#                                              chrome-devtools-mcp / ctx7 / tavily-mcp /
#                                              exa-mcp / gsd-review / gsd-debug /
#                                              gsd-progress / gsd-verify-work
#   3. gstack 治理关卡 6 (D-12)              — gstack-office-hours / gstack-plan-ceo-review /
#                                              gstack-review / gstack-qa / gstack-cso /
#                                              gstack-design-review
#   4. 核心 capability 4                    — tdd (D-13 alias) / planning-with-files (D-15 +
#                                              Q-AUDIT-5a claude-code-plugin reframe) /
#                                              ralph-loop (D-10) / superpowers-brainstorming
#   5. Agent Teams 3 (D-11 + Q-AUDIT-5b)    — agent-teams-create / agent-teams-send-message /
#                                              agent-teams-shutdown
schema_version: harnessed.capabilities.v1

capabilities:

  # ============================================================================
  # Bucket 1 — mattpocock 12 高频招式 (per D-09 + RESEARCH § 2.1)
  # ============================================================================

  grill-with-docs:
    impl: mattpocock-skills
    install_type: user-skill
    skill_dir: grill-with-docs
    cmd: /grill-with-docs
    since: v2.0
    category: tool-slash-cmd
    description: 规格澄清 with docs (fires when phase.spec_ambiguous == true)
    fires_when:
      - phase.spec_ambiguous == true

  zoom-out:
    impl: mattpocock-skills
    install_type: user-skill
    skill_dir: zoom-out
    cmd: /zoom-out
    since: v2.0
    category: tool-slash-cmd
    description: 陌生模块导航 (fires when subtask.unfamiliar_module == true)
    fires_when:
      - subtask.unfamiliar_module == true

  diagnose:
    impl: mattpocock-skills
    install_type: user-skill
    skill_dir: diagnose
    cmd: /diagnose
    since: v2.0
    category: tool-slash-cmd
    description: 系统化排错 (fires when test_fail OR debug context)
    fires_when:
      - subtask.test_fail == true
      - subtask.type == 'debug'

  caveman:
    # v3.4.2: dual-install ("互为补充") — caveman ships BOTH as user-skill
    # (git clone caveman repo into <claude-home>/skills/caveman/) AND as Claude
    # Code plugin (`caveman@caveman` in installed_plugins.json). Resolver
    # detects either; emits combined warning only if BOTH are missing.
    impl: caveman
    install_type: [user-skill, plugin]
    skill_dir: caveman
    plugin_id: caveman
    cmd: /caveman
    since: v2.0
    category: tool-slash-cmd
    description: token 紧张时 surgical edit (fires when token_tight == true)
    fires_when:
      - subtask.token_tight == true

  grill-me:
    impl: mattpocock-skills
    install_type: user-skill
    skill_dir: grill-me
    cmd: /grill-me
    since: v2.0
    category: tool-slash-cmd
    description: 反向追问 (fires when spec_ambiguous AND no_docs)
    fires_when:
      - phase.spec_ambiguous == true AND phase.no_docs == true

  to-prd:
    impl: mattpocock-skills
    install_type: user-skill
    skill_dir: to-prd
    cmd: /to-prd
    since: v2.0
    category: tool-slash-cmd
    description: translate idea → PRD (fires when phase.translate_idea_to_prd == true)
    fires_when:
      - phase.translate_idea_to_prd == true

  to-issues:
    impl: mattpocock-skills
    install_type: user-skill
    skill_dir: to-issues
    cmd: /to-issues
    since: v2.0
    category: tool-slash-cmd
    description: translate PRD → issues (fires when phase.translate_prd_to_issues == true)
    fires_when:
      - phase.translate_prd_to_issues == true

  improve-codebase-architecture:
    impl: mattpocock-skills
    install_type: user-skill
    skill_dir: improve-codebase-architecture
    cmd: /improve-codebase-architecture
    since: v2.0
    category: tool-slash-cmd
    description: architecture health audit (fires when phase.architecture_health_audit == true)
    fires_when:
      - phase.architecture_health_audit == true

  # v3.4.2 fix: code-review is a claude-plugins-official PLUGIN (not mattpocock).
  code-review:
    impl: plugin
    install_type: plugin
    plugin_id: code-review
    cmd: /code-review
    since: v2.0
    category: tool-slash-cmd
    description: verify-work parallel fan-out (multi-agent high-confidence findings)
    fires_when:
      - phase.stage == 'verify'

  # v3.4.2 fix: code-simplifier is a claude-plugins-official PLUGIN (not mattpocock).
  code-simplifier:
    impl: plugin
    install_type: plugin
    plugin_id: code-simplifier
    cmd: /code-simplifier
    since: v2.0
    category: tool-slash-cmd
    description: verify-work tail step (移除重复、多余逻辑)
    fires_when:
      - phase.stage == 'verify' AND phase.is_final_step == true

  investigate:
    impl: mattpocock-skills
    install_type: user-skill
    skill_dir: investigate
    cmd: /investigate
    since: v2.0
    category: tool-slash-cmd
    description: gstack-routed bug investigation (fires when bug_root_cause_unknown)
    fires_when:
      - subtask.bug_root_cause_unknown == true

  # Note: 剩 11 mattpocock 招式 (e.g., /retro, /ship, /office-hours-alias 等) 推 v2.x patch
  # release per D-09 (manifest-only since: v2.x — 实际未 wire 至 workflow.yaml 的 entry 不在
  # v2.0 baseline 中)。

  # ============================================================================
  # Bucket 2 — special-purpose tools 13 (per D-14 + RESEARCH § 2.2)
  # ============================================================================

  # v3.4.2 fix: ui-ux-pro-max is a marketplace PLUGIN (ui-ux-pro-max-skill), not gstack.
  ui-ux-pro-max:
    impl: plugin
    install_type: plugin
    plugin_id: ui-ux-pro-max
    cmd: /ui-ux-pro-max
    since: v2.0
    category: tool-slash-cmd
    description: UI/UX 默认主方案 数据驱动
    fires_when:
      - phase.has_ui_changes == true
      - subtask.type == 'ui_polish'

  # v3.4.2 fix: frontend-design is a claude-plugins-official PLUGIN, not gstack.
  frontend-design:
    impl: plugin
    install_type: plugin
    plugin_id: frontend-design
    cmd: /frontend-design
    since: v2.0
    category: tool-slash-cmd
    description: UI 创意/装饰补充
    fires_when:
      - phase.has_ui_changes == true AND phase.requires_creative_polish == true

  playwright-cli:
    impl: npm-cli
    cmd: playwright
    since: v2.0
    category: tool-bundled-skill
    description: "AI 实时操作浏览器 一行 Bash (手层 — 探查 / 调试 / 一次性交互)"
    fires_when:
      - subtask.type == 'browser_probe'

  playwright-test:
    impl: npm-cli
    cmd: "@playwright/test"
    since: v2.0
    category: tool-plugin
    description: "E2E test framework TypeScript (脑层 — 写测试 / 跑 CI / 断言 / fixtures / reporter)"
    fires_when:
      - subtask.type == 'e2e_test' AND subtask.language == 'typescript'

  webapp-testing:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /webapp-testing
    since: v2.0
    category: tool-bundled-skill
    description: "Python 后端联动 E2E (筋骨层 — Python Playwright + with_server.py)"
    fires_when:
      - subtask.type == 'e2e_test' AND subtask.language == 'python'

  chrome-devtools-mcp:
    impl: mcp
    cmd: chrome-devtools
    since: v2.0
    category: tool-mcp
    description: 性能/a11y/内存泄漏诊断 (非功能性 only; NOT for E2E test)
    fires_when:
      - subtask.type in ['perf_diagnose', 'a11y_audit', 'memory_leak']

  ctx7:
    impl: cli
    cmd: ctx7
    since: v2.0
    category: tool-cli
    description: 库 API/框架/SDK 文档抓取
    fires_when:
      - subtask.needs_library_docs == true

  tavily-mcp:
    impl: mcp
    cmd: tavily_search
    since: v2.0
    category: tool-mcp
    description: Web 搜索默认 (关键词/库 API/时效)
    fires_when:
      - subtask.needs_web_search == true

  exa-mcp:
    impl: mcp
    cmd: web_fetch_exa
    since: v2.0
    category: tool-mcp
    description: "描述式/学术 Web 搜索 (覆盖默认 Tavily 的场景 — 描述式查询 / 学术 / 批量抓多 URL)"
    fires_when:
      - subtask.needs_web_search == true AND subtask.search_type in ['descriptive', 'academic']

  gsd-discuss-phase:
    impl: gsd
    install_type: user-skill
    skill_dir: gsd-discuss-phase
    cmd: /gsd-discuss-phase
    since: v2.0
    category: tool-slash-cmd
    description: GSD discuss-phase 灰色澄清 (Phase 层判据 sister judgments/phase-gate.yaml)
    fires_when:
      - phase.open_decisions >= 2 OR phase.scope_days > 1

  gsd-plan-phase:
    impl: gsd
    install_type: user-skill
    skill_dir: gsd-plan-phase
    cmd: /gsd-plan-phase
    since: v2.0
    category: tool-slash-cmd
    description: GSD plan-phase Wave A research + Wave B planner + Wave C plan-checker
    fires_when:
      - phase.stage == 'plan'

  gsd-review:
    impl: gsd
    install_type: user-skill
    skill_dir: gsd-review
    cmd: /gsd-review
    since: v2.0
    category: tool-slash-cmd
    description: GSD cross-AI peer review
    fires_when:
      - phase.stage == 'verify' AND phase.requires_peer_review == true

  gsd-debug:
    impl: gsd
    install_type: user-skill
    skill_dir: gsd-debug
    cmd: /gsd-debug
    since: v2.0
    category: tool-slash-cmd
    description: GSD systematic debugging (overlap with mattpocock /diagnose — alias)
    aliases:
      - { impl: mattpocock-skills, cmd: /diagnose }
    fires_when:
      - subtask.type == 'debug'

  gsd-progress:
    impl: gsd
    install_type: user-skill
    skill_dir: gsd-progress
    cmd: /gsd-progress
    since: v2.0
    category: tool-slash-cmd
    description: GSD 状态同步 (verify-work serial after gsd-verify-work)
    fires_when:
      - phase.stage == 'verify'

  gsd-verify-work:
    impl: gsd
    install_type: user-skill
    skill_dir: gsd-verify-work
    cmd: /gsd-verify-work
    since: v2.0
    category: tool-slash-cmd
    description: verify-work entry (Stage ④ Verify 起点)
    fires_when:
      - phase.stage == 'verify'

  # ============================================================================
  # Bucket 3 — gstack 治理关卡 6 (per D-12 + CLAUDE.md "gstack 治理关卡")
  # ============================================================================

  gstack-office-hours:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /office-hours
    since: v2.0
    category: tool-slash-cmd
    description: 战略层产品理念/商业 scope 澄清 (sister CLAUDE.md "新功能启动前强制")
    fires_when:
      - phase.type in ['new_project', 'new_milestone', 'new_feature']

  gstack-plan-ceo-review:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /plan-ceo-review
    since: v2.0
    category: tool-slash-cmd
    description: 战略评估 CEO 视角 (新功能启动前强制 sister CLAUDE.md)
    fires_when:
      - phase.type == 'new_feature' AND phase.has_business_decisions == true

  gstack-review:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /review
    since: v2.0
    category: tool-slash-cmd
    description: Paranoid Staff Engineer 视角 (关键模块 PR 前强制 sister CLAUDE.md)
    fires_when:
      - phase.is_critical_module == true

  gstack-qa:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /qa
    since: v2.0
    category: tool-slash-cmd
    description: 端到端 QA 验收 (可选 conditional)
    fires_when:
      - phase.stage == 'verify' AND phase.has_ui_changes == true

  gstack-cso:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /cso
    since: v2.0
    category: tool-slash-cmd
    description: 安全审查 OWASP/auth/secrets (可选 conditional)
    fires_when:
      - phase.stage == 'verify' AND phase.has_auth_or_secrets == true

  gstack-design-review:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /design-review
    since: v2.0
    category: tool-slash-cmd
    description: 设计系统一致性审查 + AI 审美问题识别 (可选 conditional)
    fires_when:
      - phase.stage == 'verify' AND phase.has_design_changes == true

  # ============================================================================
  # Bucket 4 — 核心 capability 4 (per D-10 + D-13 + D-15 Q-AUDIT-5a + RESEARCH § 2.3)
  # ============================================================================

  # D-13: tdd entry 2 impl 候选 alias (superpowers 主 + mattpocock /tdd 备)
  tdd:
    impl: superpowers
    cmd: "superpowers:test-driven-development"
    since: v2.0
    category: tool-slash-cmd
    description: TDD red-green-refactor (gated by judgments/tdd-gate.yaml fires_when)
    aliases:
      - { impl: mattpocock-skills, cmd: /tdd }
    fires_when:
      - subtask.is_core_business_logic == true
      - subtask.is_algorithm == true
      - subtask.is_data_processing == true
      - subtask.regression_risk == 'high'
      - subtask.reliability_required == true

  # D-15 + Q-AUDIT-5a: planning-with-files impl = claude-code-plugin (NOT npm-sdk; verified
  # 2026-05-20 npm registry 404 reframe terminology drift). Real Claude Code plugin slash
  # cmd `/plan` invocation → plugin 真生成 3 file 持久化, NOT fs.writeFile self-impl。
  planning-with-files:
    impl: claude-code-plugin
    install_type: plugin
    plugin_id: planning-with-files
    cmd: /plan
    since: v2.0
    category: tool-plugin
    description: Manus-style persistent markdown planning (Claude Code plugin slash cmd)
    requires:
      plugin: planning-with-files >=2.2.0
    outputs:
      - task_plan.md
      - progress.md
      - findings.md
    fires_when:
      - phase.stage == 'plan' AND phase.requires_persisted_plan == true

  # D-10: ralph-loop 真接 SDK wrapper (NOT mock reference; sister Phase 2.2 v0.2.0 ship)
  # v3.4.2: ralph-loop is a claude-plugins-official plugin; cmd is the bare `/ralph-loop`
  # (verified: ralph-loop@claude-plugins-official in installed_plugins.json).
  ralph-loop:
    impl: plugin
    install_type: plugin
    plugin_id: ralph-loop
    cmd: /ralph-loop
    since: v2.0
    category: tool-bundled-skill
    description: Sub-task completion gate (verbatim COMPLETE; max-iterations fallback)
    sdk_ref: src/workflow/lib/ralphLoop.ts
    fires_when:
      - subtask.completion_required == true

  superpowers-brainstorming:
    impl: superpowers
    cmd: "superpowers:brainstorming"
    since: v2.0
    category: tool-slash-cmd
    description: 子任务级澄清 multi-approach 探索 (gated by judgments/subtask-gate.yaml)
    fires_when:
      - subtask.approaches >= 2
      - subtask.core_algorithm == true
      - subtask.has_api_contract == true
      - subtask.error_cost == 'high'

  # ============================================================================
  # Bucket 5 — Agent Teams 3 升级触发 (per D-11 + Q-AUDIT-5b schema fix +
  #            bundled Agent Teams prerequisite: CC 2.1.133+ + env var)
  # ============================================================================
  #
  # Q-AUDIT-5b 2026-05-20 fix: settings_env_var root-level `env.CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS`
  # (NOT nested experimental.* — Wave A 本地 settings.json 实证修正 prior schema 错误)。
  # Per Q-AUDIT-2 D-11: harnessed doctor + setup 检查 env var present + cc_version ≥2.1.133。
  #
  # 5 fires_when OR-chain (multi-select; Agent Teams upgrade triggers):
  #   1. teammate_send_message_needed — teammate 间需 SendMessage 互通 (NOT fire-and-forget)
  #   2. subagent_context_overflow    — 某 subagent 撞 context 上限需分担
  #   3. shared_task_list             — 多 teammate 共享 task list 自协调
  #   4. opposing_hypothesis_debate   — 对立假设辩论 (两 teammate 各守一假说 + lead 裁判)
  #   5. fullstack_three_way          — 全栈三路协同 (前端 + 后端 + 测试同步 + API contract)
  agent-teams-create:
    impl: claude-platform
    cmd: TeamCreate
    since: v2.0
    category: agent-platform
    description: Agent Teams team 创建 (CC 2.1.133+ experimental)
    requires:
      settings_env_var: env.CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS == "1"
      cc_version: ">=2.1.133"
    fires_when:
      - teammate_send_message_needed == true
      - subagent_context_overflow == true
      - shared_task_list == true
      - opposing_hypothesis_debate == true
      - fullstack_three_way == true

  agent-teams-send-message:
    impl: claude-platform
    cmd: SendMessage
    since: v2.0
    category: agent-platform
    description: Agent Teams teammate 间通信 (round-trip 已验证 2026-05-19)
    requires:
      settings_env_var: env.CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS == "1"
      cc_version: ">=2.1.133"

  agent-teams-shutdown:
    impl: claude-platform
    cmd: TeamDelete
    since: v2.0
    category: agent-platform
    description: Agent Teams cleanup (shutdown_request 之后 TeamDelete; mandatory cleanup discipline)
    requires:
      settings_env_var: env.CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS == "1"
      cc_version: ">=2.1.133"

  # ============================================================================
  # Bucket 6 — L0 Discipline Substrate behavioral ref (D-09 NEW v3, 6 entry)
  # ============================================================================
  #
  # behavioral category entries 不 invoke slash cmd, 而是 ref workflows/disciplines/<basename>.yaml,
  # workflow runtime pre-phase hook load discipline rules 应用 cross-cutting (per D-05 always-on)。
  # Sentinel cmd value '<not-applicable-behavioral>' — runtime engine 检测 category=behavioral 时 SKIP
  # cmd invoke, 改 load discipline_ref yaml + apply rules via hook。

  karpathy-guidelines:
    impl: harnessed-bundled
    cmd: '<not-applicable-behavioral>'
    since: v2.0
    category: behavioral
    description: 4 心法 + ≤200L hard limit + no-feature-creep + trust-internal-code + no-comments-default
    discipline_ref: workflows/disciplines/karpathy.yaml

  output-style-discipline:
    impl: harnessed-bundled
    cmd: '<not-applicable-behavioral>'
    since: v3.0
    category: behavioral
    description: BLUF + no-sycophantic + no-emoji + no-em-dash + 量词精确 + no-end-recap + no-empty-continuation-question
    discipline_ref: workflows/disciplines/output-style.yaml

  language-convention:
    impl: harnessed-bundled
    cmd: '<not-applicable-behavioral>'
    since: v3.0
    category: behavioral
    description: 默认简体中文 + 8 类强制保留英文原文 + 用户明示 lang_request 覆盖
    discipline_ref: workflows/disciplines/language.yaml

  operational-discipline:
    impl: harnessed-bundled
    cmd: '<not-applicable-behavioral>'
    since: v3.0
    category: behavioral
    description: biome-preempt + A7 ADR 守恒 + no-push-without-approval + no-skip-hooks + destructive-ops-explicit + authorization-not-transitive
    discipline_ref: workflows/disciplines/operational.yaml

  priority-hierarchy:
    impl: harnessed-bundled
    cmd: '<not-applicable-behavioral>'
    since: v3.0
    category: behavioral
    description: 7-tier priority hierarchy + multi-capability arbitration (gstack > gsd > superpowers > planning-with-files > karpathy > mattpocock > parallel)
    discipline_ref: workflows/disciplines/priority.yaml

  conceptual-protocols:
    impl: harnessed-bundled
    cmd: '<not-applicable-behavioral>'
    since: v3.0
    category: behavioral
    description: cc-handoff Ideation→Onboarding + Plan→Execute + file-ownership-strict 跨 CC instance 协议
    discipline_ref: workflows/disciplines/protocols.yaml

  # ============================================================================
  # Bucket 7 — gstack 33 optional registry-only (D-12 NEW v3)
  # ============================================================================
  #
  # 33 gstack optional slash cmd — entry name 无 `gstack-` prefix per Pattern A E.2 LOCK
  # (sister project CLAUDE.md gstack skill routing 直接 invoke cmd 名)。
  # 例外 2 alias suffix `-gstack` 避免命名冲突:
  #   - retro-gstack (alias to harnessed standalone /retro)
  #   - investigate-gstack (alias to mattpocock investigate)
  # carrier name 自带 `gstack` 字符串 (NOT prefix policy): open-gstack-browser, gstack-upgrade

  autoplan:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /autoplan
    since: v3.0
    category: tool-slash-cmd
    description: 串联完整 review pipeline (office-hours + plan-ceo-review + plan-eng-review 等)
    fires_when:
      - phase.requires_full_review_pipeline == true

  codex:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /codex
    since: v3.0
    category: tool-slash-cmd
    description: 第二意见 / cross-AI peer review via codex
    fires_when:
      - phase.stage == 'verify' AND phase.requires_second_opinion == true

  design-shotgun:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /design-shotgun
    since: v3.0
    category: tool-slash-cmd
    description: 设计 variants 探索 (一次产出多版本 mockup)
    fires_when:
      - phase.has_design_changes == true AND phase.needs_variants == true

  design-html:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /design-html
    since: v3.0
    category: tool-slash-cmd
    description: 设计 HTML mockup 生成 (throwaway 原型)
    fires_when:
      - phase.has_design_changes == true AND phase.needs_html_mockup == true

  design-consultation:
    impl: gstack
    install_type: user-skill
    skill_dir: gstack
    cmd: /design-consultation
