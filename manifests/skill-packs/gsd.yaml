# yaml-language-server: $schema=../../schemas/manifest.v1.schema.json
apiVersion: harnessed/v1
kind: Manifest
metadata:
  name: gsd
  display_name: GSD Core (Git. Ship. Done.)
  description: Project-manager orchestrator providing /gsd-* discuss-plan-execute-verify workflow.
  upstream:
    source: "@opengsd/gsd-core"
    homepage: https://github.com/open-gsd/gsd-core
    repository: https://github.com/open-gsd/gsd-core.git
    license: MIT
    notice: GSD Core (Git. Ship. Done.) by open-gsd, used as orchestration layer in harnessed plan-feature workflow.
spec:
  type: cli-npm
  component_type: command
  category: engineering
  install_type: npm
  install:
    method: npm-cli
    cmd: "npx --yes @opengsd/gsd-core@latest --claude --global"
    npm_version: ^1.6.0
    idempotent_check: "test -d ~/.claude/skills/gsd-plan-phase"
    # 4.23.0 (issue #3 req 5) — gsd-core installs gsd-* prefixed skill dirs only
    # (naturally collision-free with harnessed workflow names); declared empty on
    # purpose so the post-install diff still reports any future unprefixed name.
    installs_skills: []
  verify:
    cmd: "test -f ~/.claude/skills/gsd-plan-phase/SKILL.md"
    timeout_ms: 10000
  uninstall:
    cmd: "npx --yes @opengsd/gsd-core@latest --uninstall --claude"
    cleanup_paths:
      - ~/.claude/skills/gsd-plan-phase
  # v4.14.0 — codex install path (findings 附录实证: open-gsd 官方
  # docs/how-to/install-on-your-runtime.md — `--codex` 装到 ~/.codex/skills/gsd-*/)。
  harness_overrides:
    codex:
      install:
        method: npm-cli
        cmd: "npx --yes @opengsd/gsd-core@latest --codex --global"
        npm_version: ^1.6.0
        idempotent_check: "test -d ~/.codex/skills/gsd-plan-phase"
      verify:
        cmd: "test -f ~/.codex/skills/gsd-plan-phase/SKILL.md"
        timeout_ms: 10000
  upstream_health:
    stability: stable
    # v15.0 re-sync (2026-07-13) — 1.6.1 hotfix 已被 ^1.6.0 semver 覆盖(cmd 用
    # @latest 自动拿到);1.7.0 在 rc.6(host-integration interface ADR-1239 +
    # write-confinement),GA 后再评 — watch 项见 TODOS.md。
    last_check: "2026-07-13"
    last_known_good_version: 1.6.1
    fallback_action: warn
  signed_by: easyinplay
  platforms:
    - linux
    - darwin
    - win32
  tested_with_versions:
    node_versions:
      - "22"
