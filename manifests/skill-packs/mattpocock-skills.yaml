# yaml-language-server: $schema=../../schemas/manifest.v1.schema.json
apiVersion: harnessed/v1
kind: Manifest
metadata:
  name: mattpocock-skills
  display_name: mattpocock-skills
  description: Engineering/productivity skill pack (/diagnosing-bugs /tdd /grill-with-docs /to-prd etc.) by Matt Pocock.
  upstream:
    source: mattpocock/skills
    homepage: https://github.com/mattpocock/skills
    repository: https://github.com/mattpocock/skills.git
    license: MIT
    notice: mattpocock-skills by Matt Pocock, used as on-demand engineering tactics (招式) in harnessed.
spec:
  type: cc-skill-pack
  component_type: command
  category: engineering
  install_type: skill
  install:
    method: npx-skill-installer
    # v3.9.9 — restored skills@latest per user instruction (version pinning belongs
    # in ADR/lockfile layer, not in per-manifest cmd strings). Added --copy --global
    # per D2.1-5 (Windows symlink-safe + user-scope install).
    # v4.13.0 — added `-y`: without it the skills CLI prompts interactively on
    # fresh machines and the spawn hangs to the 300s timeout (user dogfood).
    # v4.14.0 — `--agent` REMOVED from the manifest: the installer injects
    # `--agent <claude-code|codex>` from the active platform descriptor
    # (hardcoding claude-code pinned the wrong install target on codex).
    cmd: "npx --yes skills@latest add mattpocock/skills --copy --global -y"
    npm_version: ^1.5.7
    # v4.13.0 — the skills CLI installs INDIVIDUAL skill dirs, never a
    # mattpocock-skills/ parent folder; probe indicators.
    # v4.16.0 — upstream renamed `diagnose` → `diagnosing-bugs` and dropped
    # `zoom-out` (verified 2026-07-03 via skills/engineering listing); probe the
    # surviving `tdd` + the new name so fresh installs verify (dogfood v4.15.2:
    # verify pinned the dead `diagnose` path → every refresh reported failed).
    idempotent_check: "test -d ~/.claude/skills/tdd || test -d ~/.agents/skills/tdd || test -d ~/.claude/skills/diagnosing-bugs || test -d ~/.agents/skills/diagnosing-bugs"
    # 4.23.0 (issue #3 req 5) — upstream skills/ engineering + productivity sets
    # (gh api 实证 2026-07-10). `research` COLLIDES with harnessed's research
    # workflow — the post-Step-B integrity pass restores the engine version.
    installs_skills:
      - ask-matt
      - code-review
      - codebase-design
      - diagnosing-bugs
      - domain-modeling
      - grill-with-docs
      - implement
      - improve-codebase-architecture
      - prototype
      - research
      - resolving-merge-conflicts
      - setup-matt-pocock-skills
      - tdd
      - to-issues
      - to-prd
      - triage
      - grill-me
      - grilling
      - handoff
      - teach
      - writing-great-skills
  verify:
    cmd: "test -f ~/.claude/skills/tdd/SKILL.md || test -f ~/.agents/skills/tdd/SKILL.md || test -f ~/.claude/skills/diagnosing-bugs/SKILL.md || test -f ~/.agents/skills/diagnosing-bugs/SKILL.md"
    timeout_ms: 5000
  uninstall:
    cmd: "rm -rf ~/.claude/skills/mattpocock-skills"
    cleanup_paths:
      - ~/.claude/skills/mattpocock-skills
  upstream_health:
    stability: stable
    last_check: "2026-06-09"
    last_known_good_version: main-76-commits
    fallback_action: warn
  signed_by: easyinplay
  platforms:
    - linux
    - darwin
    - win32
