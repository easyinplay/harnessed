# yaml-language-server: $schema=../../schemas/manifest.v1.schema.json
apiVersion: harnessed/v1
kind: Manifest
metadata:
  name: mattpocock-skills
  display_name: mattpocock-skills
  description: 17 single-slash command skills (/diagnose /zoom-out /tdd /grill-with-docs etc.) by Matt Pocock.
  upstream:
    source: mattpocock/skills
    homepage: https://github.com/mattpocock/skills
    repository: https://github.com/mattpocock/skills.git
    license: MIT
    notice: mattpocock-skills by Matt Pocock, used as on-demand engineering tactics (招式) in harnessed.
spec:
  type: cc-skill-pack
  component_type: command
  category: engineering
  install_type: skill
  install:
    method: npx-skill-installer
    # v3.9.9 — restored skills@latest per user instruction (version pinning belongs
    # in ADR/lockfile layer, not in per-manifest cmd strings). Added --copy --global
    # per D2.1-5 (Windows symlink-safe + user-scope install).
    cmd: "npx --yes skills@latest add mattpocock/skills --copy --global"
    npm_version: ^1.5.7
    idempotent_check: "test -d ~/.claude/skills/mattpocock-skills || test -d ~/.agents/skills/mattpocock-skills"
  verify:
    cmd: "test -f ~/.claude/skills/mattpocock-skills/diagnose.md"
    timeout_ms: 5000
  uninstall:
    cmd: "rm -rf ~/.claude/skills/mattpocock-skills"
    cleanup_paths:
      - ~/.claude/skills/mattpocock-skills
  upstream_health:
    stability: stable
    last_check: "2026-05-11"
    last_known_good_version: main-76-commits
    fallback_action: warn
  signed_by: easyinplay
  platforms:
    - linux
    - darwin
    - win32
