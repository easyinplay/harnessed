# yaml-language-server: $schema=../../schemas/manifest.v1.schema.json
apiVersion: harnessed/v1
kind: Manifest
metadata:
  name: design-taste-frontend
  display_name: design-taste-frontend (Leonxlnx/taste-skill)
  description: Cross-agent anti-slop frontend visual-polish skill (taste-skill v2); Stage-2 overlay atop ui-ux-pro-max structure.
  upstream:
    source: leonxlnx/taste-skill
    homepage: https://tasteskill.dev
    repository: https://github.com/Leonxlnx/taste-skill.git
    license: MIT
    notice: |
      design-taste-frontend (v2 default variant) from Leonxlnx/taste-skill — Anti-Slop Frontend Framework
      (premium 视觉打磨, 防 AI 生成 boring/generic slop). Cross-agent (claude-code + codex),
      遵循 vercel-labs/agent-skills 标准。两段式 Stage 2: 在 ui-ux-pro-max 结构骨架之上叠加细节 + 视觉打磨 → 高级感。
spec:
  type: cc-skill-pack
  component_type: command
  category: design
  install_type: skill
  install:
    method: npx-skill-installer
    # 只装路由用到的 design-taste-frontend(v2 默认)。它是 PromptScript 类型,不支持
    # --global(`PromptScript does not support global skill installation`;full-URL +
    # --global 实测 300s hang),且整 pack 批量 add 会跳过 v2(只装 v1 + 其余 symlink)——
    # 只有 --skill design-taste-frontend 才装得上 v2。简写 + 仅 --copy:把 SKILL.md 真文件
    # 装到 ~/.claude/skills/design-taste-frontend/(verify 位置),实测 4s 成功。
    cmd: "npx --yes skills@latest add Leonxlnx/taste-skill --skill design-taste-frontend --copy"
    npm_version: ^1.5.7
    idempotent_check: "test -d ~/.claude/skills/design-taste-frontend || test -d ~/.agents/skills/design-taste-frontend"
  verify:
    cmd: "test -f ~/.claude/skills/design-taste-frontend/SKILL.md"
    timeout_ms: 5000
    expected_exit_code: 0
  uninstall:
    cmd: "rm -rf ~/.claude/skills/design-taste-frontend"
    cleanup_paths:
      - ~/.claude/skills/design-taste-frontend
  upstream_health:
    stability: stable
    last_check: "2026-06-30"
    last_known_good_version: v2-default
    fallback_action: warn
  signed_by: easyinplay
  platforms:
    - linux
    - darwin
    - win32
