# yaml-language-server: $schema=../../schemas/manifest.v1.schema.json
apiVersion: harnessed/v1
kind: Manifest
metadata:
  name: gstack
  display_name: gstack
  description: Virtual startup team skills (CEO/Eng/Designer/Paranoid Engineer) for governance gates.
  upstream:
    source: gstack
    homepage: https://gstacks.org
    repository: https://github.com/garrytan/gstack.git
    license: MIT
    notice: gstack by Garry Tan, used as governance layer per harnessed plan-feature workflow.
spec:
  type: cc-skill-pack
  component_type: command
  category: engineering
  install_type: git
  install:
    method: git-clone-with-setup
    # v4.14.2 — 上游脚本 setup.sh → setup 改名 + repo 布局改为根级 skill dirs
    # (office-hours/SKILL.md,原 skills/office-hours.md 已不存在;本机 v1.52+ 实证)。
    # clone 保持无 flag 的 `git clone <url> <dest>` 形状 — extractGitCloneTarget
    # 与 git-clone-idempotent 回归测试锁定该相邻性(--single-branch 会使解析错位)。
    cmd: "rm -rf ~/.claude/skills/gstack && git clone https://github.com/garrytan/gstack.git ~/.claude/skills/gstack && cd ~/.claude/skills/gstack && bash ./setup"
    # v4.16.2 — pin bumped to upstream HEAD (was 14fc0866, v1.52 era; force-update
    # dogfood surfaced the drift warn). Per ADR 0037 the pin records install-time
    # last-known-good state — bump on release cadence, not per upstream push.
    git_ref: 11de390be1be6849eb9a15f91ff4922dd16c589a
    idempotent_check: "test -d ~/.claude/skills/gstack/.git"
  # v4.14.2 — 用户指正: gstack 官方支持 10 agents(README § Other AI Agents),
  # codex 走 `./setup --host codex`,skills 装到 ~/.codex/skills/gstack-*/。
  harness_overrides:
    codex:
      install:
        method: git-clone-with-setup
        cmd: "rm -rf ~/gstack && git clone https://github.com/garrytan/gstack.git ~/gstack && cd ~/gstack && bash ./setup --host codex"
        git_ref: 11de390be1be6849eb9a15f91ff4922dd16c589a
        idempotent_check: "ls ~/.codex/skills 2>/dev/null | grep -q '^gstack-'"
      verify:
        cmd: "ls ~/.codex/skills | grep -q '^gstack-'"
        timeout_ms: 10000
  verify:
    cmd: "test -f ~/.claude/skills/gstack/office-hours/SKILL.md"
    timeout_ms: 5000
  uninstall:
    cmd: "rm -rf ~/.claude/skills/gstack"
    cleanup_paths:
      - ~/.claude/skills/gstack
  upstream_health:
    stability: stable
    last_check: "2026-07-03"
    last_known_good_version: 1.58.5.0
    fallback_action: warn
  signed_by: easyinplay
  platforms:
    - linux
    - darwin
    - win32
