# yaml-language-server: $schema=../../schemas/manifest.v1.schema.json
# OPT-IN catalog manifest — lives in manifests/optional/ so `harnessed setup`
# Step B (which globs only manifests/tools + manifests/skill-packs) never pulls it
# into the base profile (no auto-install). It IS installable on demand: explicit
# `harnessed install codegraph` resolves manifests/optional/ as the third tier and
# runs the npm-cli method below. CodeGraph ships its own installer; harnessed
# catalogs + detects only.
apiVersion: harnessed/v1
kind: Manifest
metadata:
  name: codegraph
  display_name: CodeGraph
  description: Pre-indexed code knowledge graph (semantic index) for Claude Code — fewer tokens/tool-calls. Opt-in, self-installed.
  upstream:
    source: codegraph
    homepage: https://colbymchenry.github.io/codegraph/
    repository: https://github.com/colbymchenry/codegraph.git
    license: MIT
    notice: |
      CodeGraph by colbymchenry (MIT, 100% local). Optional semantic code index —
      harnessed catalogs + detects only; CodeGraph self-installs via its own CLI
      (`codegraph install` wires its MCP server into Claude Code). Not vendored.
spec:
  type: cli-npm
  component_type: cli-binary
  category: search
  install_type: npm
  install:
    method: npm-cli
    cmd: "npm i -g @colbymchenry/codegraph && codegraph install --yes"
    npm_version: ^1.0.0
    idempotent_check: "command -v codegraph"
  verify:
    # v4.18.0 — `--version` instead of `status`: verify runs right after the
    # global install (setup optional-offer / harnessed install), where no
    # per-project .codegraph/ index exists yet — `status` semantics without a
    # project context are unverified upstream; `--version` only asserts the
    # binary is on PATH, which is exactly what this install step guarantees.
    # The per-project index is the separate `codegraph init` (doctor hint).
    cmd: "codegraph --version"
    timeout_ms: 10000
    expected_exit_code: 0
  uninstall:
    cmd: "codegraph uninstall --yes"
  upstream_health:
    stability: stable
    last_check: "2026-07-04"
    last_known_good_version: "1.0.0"
    fallback_action: warn
  signed_by: easyinplay
  platforms:
    - linux
    - darwin
    - win32
