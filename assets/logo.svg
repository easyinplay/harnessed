<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" fill="none" role="img" aria-label="harnessed">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#7C6BF0"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="820" height="200" rx="26" fill="#0A0A0F"/>
  <rect x="1" y="1" width="818" height="198" rx="25" fill="none" stroke="#1E1B2E" stroke-width="2"/>

  <!-- brand mark: H monogram (harness) in a rounded tile -->
  <rect x="52" y="56" width="88" height="88" rx="22" fill="#16121F" stroke="#312A47" stroke-width="1.5"/>
  <path d="M78 80v40M114 80v40M78 100h36" stroke="url(#hg)" stroke-width="8" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="172" y="114" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#FAFAFA" letter-spacing="-3">harnessed</text>

